<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Riverbend Night Market Flyer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600;9..144,900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#16213E;
    --gold:#F2A93B;
    --coral:#E8593F;
    --cream:#F6F1E7;
    --teal:#274B4B;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#0d1226;}
  body{
    display:flex;
    justify-content:center;
    padding:32px 16px;
    font-family:'Inter',sans-serif;
  }
  .poster{
    position:relative;
    width:100%;
    max-width:620px;
    aspect-ratio:5/7;
    background:
      radial-gradient(ellipse 120% 70% at 50% -10%, #24365f 0%, var(--ink) 55%),
      var(--ink);
    border-radius:6px;
    overflow:hidden;
    box-shadow:0 30px 60px -20px rgba(0,0,0,.6);
    color:var(--cream);
  }
  /* stars */
  .stars{position:absolute; inset:0; opacity:.55;}
  /* string lights */
  .lights{position:absolute; top:0; left:0; width:100%; height:34%;}
  .glow-strip{
    position:absolute; top:0; left:-5%; width:110%; height:100%;
    background: radial-gradient(ellipse 60% 100% at 50% 0%, rgba(242,169,59,.20), transparent 70%);
  }
  .eyebrow{
    position:absolute; top:8.5%; left:8%;
    font-family:'JetBrains Mono',monospace;
    font-weight:700;
    letter-spacing:.22em;
    font-size:11.5px;
    color:var(--gold);
    text-transform:uppercase;
  }
  .eyebrow::before{content:"— "; color:var(--coral);}
  .headline{
    position:absolute;
    top:16%;
    left:8%;
    right:8%;
    font-family:'Fraunces', serif;
    font-weight:900;
    font-optical-sizing:auto;
    font-size:clamp(38px, 9.2vw, 58px);
    line-height:.96;
    letter-spacing:-.01em;
  }
  .headline .accent{
    color:var(--gold);
    font-style:italic;
    font-weight:500;
  }
  .subline{
    position:absolute;
    top:41.5%;
    left:8%;
    right:12%;
    font-size:14.5px;
    line-height:1.5;
    color:#D8D3C4;
    max-width:88%;
  }
  /* lantern illustration cluster, signature element */
  .lanterns{position:absolute; right:6%; top:9%; width:34%; height:34%;}

  /* date/place card */
  .card{
    position:absolute;
    left:6%; right:6%; bottom:6%;
    background:var(--cream);
    color:var(--ink);
    border-radius:3px;
    padding:22px 22px 20px;
    clip-path: polygon(0% 1.5%, 2% 0%, 98% 0%, 100% 1.5%, 100% 98.5%, 98% 100%, 2% 100%, 0% 98.5%);
  }
  .row{display:flex; align-items:flex-end; justify-content:space-between; gap:14px;}
  .datebox{
    font-family:'JetBrains Mono',monospace;
    font-weight:700;
    background:var(--coral);
    color:var(--cream);
    padding:8px 12px;
    border-radius:2px;
    font-size:13px;
    letter-spacing:.05em;
    white-space:nowrap;
  }
  .place{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:19px;
    line-height:1.15;
  }
  .place small{
    display:block;
    font-family:'Inter',sans-serif;
    font-weight:400;
    font-size:12.5px;
    color:#5b5648;
    margin-top:3px;
  }
  .divider{
    border:none;
    border-top:1px dashed #b9b19c;
    margin:14px 0;
  }
  .footrow{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:11.5px;
    color:#5b5648;
  }
  .footrow b{color:var(--ink);}
  .tag{
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;
    letter-spacing:.08em;
    color:var(--teal);
    text-transform:uppercase;
  }
</style>
</head>
<body>

<div class="poster" id="poster">

  <svg class="stars" viewBox="0 0 500 700" preserveAspectRatio="none">
    <!-- scattered soft stars -->
    <circle cx="40" cy="60" r="1.4" fill="#F6F1E7" opacity=".7"/>
    <circle cx="90" cy="140" r="1" fill="#F6F1E7" opacity=".5"/>
    <circle cx="430" cy="90" r="1.6" fill="#F6F1E7" opacity=".6"/>
    <circle cx="470" cy="200" r="1" fill="#F6F1E7" opacity=".5"/>
    <circle cx="60" cy="230" r="1.2" fill="#F6F1E7" opacity=".55"/>
    <circle cx="350" cy="60" r="1" fill="#F6F1E7" opacity=".5"/>
    <circle cx="410" cy="250" r="1.3" fill="#F6F1E7" opacity=".5"/>
    <circle cx="150" cy="50" r="1" fill="#F6F1E7" opacity=".45"/>
  </svg>

  <div class="lights">
    <div class="glow-strip"></div>
    <svg viewBox="0 0 500 170" width="100%" height="100%" preserveAspectRatio="none">
      <!-- sagging string -->
      <path d="M -20 20 Q 125 110 250 30 T 520 20" stroke="#8a7550" stroke-width="1.5" fill="none" opacity=".6"/>
      <!-- bulbs along the string, alternating gold / coral, with soft glow halos -->
      <g>
        <circle cx="30" cy="35" r="10" fill="#F2A93B" opacity=".18"/>
        <circle cx="30" cy="35" r="4" fill="#F2A93B"/>

        <circle cx="95" cy="70" r="10" fill="#E8593F" opacity=".18"/>
        <circle cx="95" cy="70" r="4" fill="#E8593F"/>

        <circle cx="160" cy="88" r="11" fill="#F2A93B" opacity=".2"/>
        <circle cx="160" cy="88" r="4.3" fill="#F2A93B"/>

        <circle cx="228" cy="70" r="10" fill="#F2A93B" opacity=".18"/>
        <circle cx="228" cy="70" r="4" fill="#F2A93B"/>

        <circle cx="292" cy="42" r="10" fill="#E8593F" opacity=".18"/>
        <circle cx="292" cy="42" r="4" fill="#E8593F"/>

        <circle cx="355" cy="32" r="11" fill="#F2A93B" opacity=".2"/>
        <circle cx="355" cy="32" r="4.3" fill="#F2A93B"/>

        <circle cx="420" cy="45" r="10" fill="#E8593F" opacity=".18"/>
        <circle cx="420" cy="45" r="4" fill="#E8593F"/>

        <circle cx="475" cy="30" r="10" fill="#F2A93B" opacity=".18"/>
        <circle cx="475" cy="30" r="4" fill="#F2A93B"/>
      </g>
    </svg>
  </div>

  <div class="eyebrow">Public market series</div>

  <div class="headline">RIVERBEND<br><span class="accent">Night</span> Market</div>

  <div class="subline">
    Food carts, live music, and forty local makers set up along the river walk after dark. Bring cash for the lantern raffle.
  </div>

  <!-- signature lantern cluster -->
  <svg class="lanterns" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
    <g opacity="0.95">
      <line x1="70" y1="0" x2="70" y2="30" stroke="#8a7550" stroke-width="1.2"/>
      <ellipse cx="70" cy="55" rx="20" ry="26" fill="#F2A93B"/>
      <ellipse cx="70" cy="55" rx="20" ry="26" fill="none" stroke="#7a5320" stroke-width="1.5"/>
      <line x1="53" y1="42" x2="87" y2="42" stroke="#7a5320" stroke-width="1"/>
      <line x1="53" y1="68" x2="87" y2="68" stroke="#7a5320" stroke-width="1"/>

      <line x1="150" y1="20" x2="150" y2="55" stroke="#8a7550" stroke-width="1.2"/>
      <ellipse cx="150" cy="82" rx="16" ry="21" fill="#E8593F"/>
      <ellipse cx="150" cy="82" rx="16" ry="21" fill="none" stroke="#7a2a17" stroke-width="1.5"/>
      <line x1="136" y1="72" x2="164" y2="72" stroke="#7a2a17" stroke-width="1"/>
      <line x1="136" y1="92" x2="164" y2="92" stroke="#7a2a17" stroke-width="1"/>

      <line x1="105" y1="50" x2="105" y2="80" stroke="#8a7550" stroke-width="1.2"/>
      <ellipse cx="105" cy="105" rx="13" ry="17" fill="#F6F1E7"/>
      <ellipse cx="105" cy="105" rx="13" ry="17" fill="none" stroke="#96907c" stroke-width="1.3"/>
    </g>
  </svg>

  <div class="card">
    <div class="row">
      <div class="place">Riverwalk Commons
        <small>200 Harbor Path · Riverbend</small>
      </div>
      <div class="datebox">FRI · AUG 21<br>7–11 PM</div>
    </div>
    <hr class="divider">
    <div class="footrow">
      <span class="tag">Free entry</span>
      <span><b>riverbendmarket.co</b></span>
    </div>
  </div>

</div>

</body>
</html>
